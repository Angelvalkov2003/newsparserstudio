services:
  mongodb:
    image: mongo:8.2
    container_name: newsparser-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: newsparser-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB_NAME: universal_markdown_builder
      JWT_SECRET: change-me-in-production
      DB_HOST: host.docker.internal
      DB_PORT: "3306"
      DB_NAME: tpf2
      DB_USER: tpf_user
      DB_PASS: 780428Rady!
      SQL_SYNC_ENABLED: "true"
      SQL_SYNC_BATCH_SIZE: "200"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: newsparser-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data: